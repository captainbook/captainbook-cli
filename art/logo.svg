<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <mask id="face-cutout">
      <rect width="200" height="200" fill="white" />
      <!-- Cut out open eye -->
      <circle cx="68" cy="108" r="9" fill="black" />
      <!-- Cut out winking eye > -->
      <path d="M112 93 L140 108 L112 123" fill="none" stroke="black" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
      <!-- Cut out mouth -->
      <line x1="68" y1="150" x2="138" y2="150" stroke="black" stroke-width="10" stroke-linecap="round" />
    </mask>
  </defs>

  <!-- Single rounded square — one shape, no separate hat -->
  <g mask="url(#face-cutout)">
    <rect x="20" y="20" width="160" height="160" rx="36" fill="#2c3e50" />
    <!-- Gold band — divides "hat" from "face" -->
    <line x1="20" y1="72" x2="180" y2="72" stroke="#d4a845" stroke-width="6" />
  </g>
</svg>
