              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/MutationResult"
                          - type: object
                            properties:
                              available_gift_certificate:
                                $ref: "#/components/schemas/AvailableGiftCertificate"
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }

  /gift-certs/available/{id}:
    get:
      operationId: showAvailableGiftCert
      summary: Show a sellable gift-cert SKU
      tags: [GiftCertificates]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Available gift cert
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AvailableGiftCertificate" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

    delete:
      operationId: deleteAvailableGiftCertificate
      summary: Delete a gift-cert SKU
      description: |
        Hard-deletes the AvailableGiftCertificate (the sellable SKU). Returns 409
        if any issued `GiftCertificate` references this SKU — issued certs hold a
        FK to the SKU. Caller must void all issued certs first, or accept that
        deleting the SKU will orphan their lookup.
      tags: [GiftCertificates]
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204":
          description: Deleted
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
    patch:
      operationId: updateAvailableGiftCert
      summary: Update a sellable gift-cert SKU
      tags: [GiftCertificates]
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAvailableGiftCertRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/MutationResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

  /gift-certs/issued:
    get:
      operationId: listIssuedGiftCerts
      summary: List issued gift certificates
      tags: [GiftCertificates]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - name: status
          in: query
          schema: { type: string, enum: [active, redeemed, partial, void, expired] }
        - name: recipient_email
          in: query
          schema: { type: string, format: email }
        - name: code
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Page
          content:
