    QuestionPage:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/Question" }

    Category:
      type: object
      description: |
        Read-only resource (no Create/Update endpoints — Phase 1B + commit
        9bce20074). Mirrors `CategoryResource::toArray()`. The
        `product_categories` table only persists `id` + `name`; `slug`,
        `description`, and `position` are surfaced because the
        `ProductCategory` model has accessors for them, but they read as null
        / 0 against today's schema.
      properties:
        id: { type: string }
        name: { type: string, nullable: true, description: "English translation of the `name` column." }
        slug: { type: string, nullable: true, description: "No underlying column — null today." }
        description: { type: string, nullable: true, description: "No underlying column — null today." }
        position: { type: integer, nullable: true, description: "No underlying column — null today." }
        product_count: { type: integer, nullable: true, description: "Set only when the `products` relation is eager-loaded; otherwise null." }
        created_at: { type: string, format: date-time, nullable: true }

    Resource:
      type: object
      description: |
        Physical or human inventory bound to a ProductOption (a boat, a
        guide, a yoga studio). `category` is the kind of resource;
        `type` is a free-form label tenants pick (`Sailboat`, `Senior
        Guide`, etc.). `capacity` is optional — null means the resource
        doesn't constrain seat count by itself.
      properties:
        id: { type: string }
        name: { type: string, nullable: true }
        type: { type: string, nullable: true }
        category:
          type: string
          nullable: true
          enum: [guide, asset, equipment, auxiliary]
        capacity: { type: integer, nullable: true }
        rating: { type: number, format: float, nullable: true }
        deleted_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }

    Location:
      type: object
      description: |
        Mirrors `LocationResource::toArray()`. The `locations.type` column is
        a MySQL enum with values `PRIMARY|START|END|VISITED|SECONDARY` (no
        `MEETING` — earlier spec drafts listed it but it was never a valid
        value; the column write would silently coerce to NULL).
        `address` is a derived accessor (`getAddressAttribute()` composing
        `street_address` + city + country). `timezone` and `notes` have no
        underlying columns and read as null today.
      properties:
        id: { type: string }
        type:
          type: string
          nullable: true
          enum: [PRIMARY, START, END, VISITED, SECONDARY]
        name: { type: string, nullable: true }
        address: { type: string, nullable: true, description: "Derived from `street_address` (+ optional city/country)." }
        latitude: { type: number, format: float, nullable: true }
        longitude: { type: number, format: float, nullable: true }
        google_place_id: { type: string, nullable: true }
        timezone: { type: string, nullable: true, description: "Always null today — no underlying column." }
        notes: { type: string, nullable: true, description: "Always null today — no underlying column." }
        created_at: { type: string, format: date-time, nullable: true }

    Media:
      type: object
      properties:
        id: { type: string }
        product_id: { type: string }
        type:
          type: string
          enum: [image, document]
        url: { type: string, format: uri }
        thumbnail_url: { type: string, format: uri, nullable: true }
        original_filename: { type: string }
        mime_type: { type: string }
        size_bytes: { type: integer }
        alt_text: { type: string, nullable: true }
        position: { type: integer }
        created_at: { type: string, format: date-time }

    CategoryPage:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/Category" }

    ResourcePage:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/Resource" }

    LocationPage:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/Location" }

    MediaPage:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/Media" }

    CreateProductRequest:
      type: object
      required: [title, currency]
      description: |
        Mirrors `CreateProductRequest::rules()`. `product_code` is optional —
        when omitted, the server auto-generates one from the title slug plus
        a random suffix (`SUNSET-SAILING-TOUR-AB12CD`). `description` is
        optional on the wire but is materialized as `{"en": ""}` server-side
        when omitted, because `central_products.description` is NOT NULL.
        Translatable text fields (`description`, `instructions`,
        `requirements`, `inclusions`, `exclusions`) accept bare strings;
        the server wraps them into the `{"en": "..."}` HasTranslations bag.
        `description`, `instructions`, and `requirements` are rich-text
        (HTML accepted). `inclusions` and `exclusions` are plain text — the
        server rejects payloads containing HTML tags with 422; use a newline
        between each bullet item.
      properties:
        title: { type: string, maxLength: 200 }
        product_code: { type: string, maxLength: 50, nullable: true, description: "Tenant-supplied SKU. Auto-generated from title when omitted." }
        description: { type: string, nullable: true, description: "Defaults to empty string server-side when omitted (central_products.description is NOT NULL)." }
        instructions: { type: string, nullable: true, description: "Rich text shown to confirmed customers. Translatable." }
        requirements: { type: string, nullable: true, description: "Rich text — what the customer needs. Translatable." }
        inclusions: { type: string, nullable: true, description: "Plain text — what's included. One bullet per newline. Translatable. NOT rich-text — payloads containing HTML tags are rejected with 422." }
        exclusions: { type: string, nullable: true, description: "Plain text — what's not included. One bullet per newline. Translatable. NOT rich-text — payloads containing HTML tags are rejected with 422." }
        status:
          type: string
          enum: [draft, published]
          default: draft
          description: "Translates to the underlying `is_active` boolean."
        schedule_type:
          type: string
          enum: [date, datetime]
          description: "`date` for date-only products; `datetime` for products with a starting time."
        is_private: { type: boolean, default: false, description: "`true` = a single party books the whole experience (private); `false` = multiple parties share the slot (shared). When `false`, `is_priced_per_person` is forced to `true` and `use_alternate_tier_pricing` to `false` regardless of what the caller supplied." }
        is_priced_per_person: { type: boolean, default: true, description: "`true` = price applies per traveler; `false` = price applies per group/booking. Implicitly forced to `true` when `is_private=false`." }
        is_tier_priced: { type: boolean, default: false, description: "Whether quantity-based pricing tiers apply." }
        use_alternate_tier_pricing: { type: boolean, default: false, description: "Alternate tier-pricing rendering / calculation. Implicitly forced to `false` when `is_private=false`." }
        show_last_tier: { type: boolean, default: false, description: "Whether the last tier is displayed in customer-facing pricing." }
        displayable: { type: boolean, default: true, description: "Whether the product is shown in widgets / catalog." }
        must_validate_cancellation_policy: { type: boolean, default: false, description: "Customer must explicitly accept the cancellation policy at checkout. When `false`, both `cancellation_policy` and `cancellation_policy_link` are nulled regardless of what the caller supplied — set `true` to retain a policy." }
        from_price: { type: integer, minimum: 0, nullable: true, description: "Minor units." }
        from_price_label: { type: string, maxLength: 255, nullable: true, description: "Caption shown next to `from_price` (e.g., `From €50/person`)." }
        currency: { type: string, minLength: 3, maxLength: 3 }
        capacity: { type: integer, minimum: 0, nullable: true }
        cancellation_policy: { type: string, nullable: true, description: "Inline policy text. Mutually exclusive with `cancellation_policy_link`." }
        cancellation_policy_link: { type: string, format: uri, maxLength: 500, nullable: true, description: "External URL with the policy. Mutually exclusive with `cancellation_policy`." }
        locale: { type: string, maxLength: 10, nullable: true, description: "Default content locale for this product (e.g., `en`)." }
        category_ids:
          type: array
          items: { type: integer }
        timezone: { type: string, maxLength: 64, nullable: true }
        dry_run: { type: boolean, default: false }

    UpdateProductRequest:
      type: object
      description: |
        Mirrors `UpdateProductRequest::rules()`. Same field semantics as
        `CreateProductRequest`. Every field is optional — only supplied
        keys are updated.
      properties:
        title: { type: string, maxLength: 200 }
        product_code: { type: string, maxLength: 50 }
        description: { type: string, nullable: true }
        instructions: { type: string, nullable: true }
        requirements: { type: string, nullable: true }
        inclusions: { type: string, nullable: true, description: "Plain text — one bullet per newline. NOT rich-text — payloads containing HTML tags are rejected with 422." }
        exclusions: { type: string, nullable: true, description: "Plain text — one bullet per newline. NOT rich-text — payloads containing HTML tags are rejected with 422." }
        status:
          type: string
          enum: [draft, published]
        schedule_type:
          type: string
          enum: [date, datetime]
          description: "`date` for date-only products; `datetime` for products with a starting time."
        is_private: { type: boolean, description: "Switching this triggers an inventory cascade: every Availability of every related ProductOption is bulk-updated and seven inventory recompute jobs are dispatched. See the endpoint-level description for the full chain. When `false`, `is_priced_per_person` and `use_alternate_tier_pricing` are implicitly overridden — see Create description." }
        is_priced_per_person: { type: boolean }
        is_tier_priced: { type: boolean }
        use_alternate_tier_pricing: { type: boolean }
        show_last_tier: { type: boolean }
        displayable: { type: boolean }
        must_validate_cancellation_policy: { type: boolean }
        from_price: { type: integer, minimum: 0, nullable: true }
        from_price_label: { type: string, maxLength: 255, nullable: true }
        capacity: { type: integer, minimum: 0, nullable: true }
        cancellation_policy: { type: string, nullable: true }
        cancellation_policy_link: { type: string, format: uri, maxLength: 500, nullable: true }
        locale: { type: string, maxLength: 10, nullable: true }
        category_ids:
          type: array
          items: { type: integer }
        timezone: { type: string, maxLength: 64, nullable: true }
        dry_run: { type: boolean, default: false }

    CreateProductOptionRequest:
      type: object
      required: [product_id, title]
      description: |
        Mirrors `CreateProductOptionRequest::rules()`. `title` is mapped onto
        the `name` column by the controller. `option_code` is optional —
        when omitted, the server auto-generates one from the title slug plus
        a random suffix. ProductOption has no description or published/draft
        flag of its own — those live on the parent Product.
      properties:
        product_id: { type: string }
        title: { type: string, maxLength: 200, description: "Persisted as the `name` column." }
        option_code: { type: string, maxLength: 50, nullable: true, description: "Tenant-supplied SKU. Auto-generated from title when omitted." }
        capacity: { type: integer, minimum: 0, nullable: true }
        min_age: { type: integer, minimum: 0, nullable: true }
        max_age: { type: integer, minimum: 0, nullable: true }
        dry_run: { type: boolean, default: false }

    UpdateProductOptionRequest:
      type: object
      description: |
        Mirrors `UpdateProductOptionRequest::rules()`. Same field semantics as
        `CreateProductOptionRequest` (title → name).
      properties:
        title: { type: string, maxLength: 200 }
        option_code: { type: string, maxLength: 50 }
        capacity: { type: integer, minimum: 0, nullable: true }
        min_age: { type: integer, minimum: 0, nullable: true }
        max_age: { type: integer, minimum: 0, nullable: true }
        dry_run: { type: boolean, default: false }

    CreatePricingCategoryRequest:
      type: object
      required: [product_id, name]
      description: |
        Mirrors `CreatePricingCategoryRequest::rules()`. `name` is
        translatable — accepts a bare string, persisted as `{"en": "..."}`.
      properties:
        product_id: { type: string }
        name: { type: string, maxLength: 200 }
        type:
          type: string
          enum: [ADULT, CHILD, INFANT, YOUTH, STUDENT, SENIOR, TRAVELLER, EU_CITIZEN, MILITARY, EU_CITIZEN_STUDENT]
          default: TRAVELLER
        min_age: { type: integer, minimum: 0, nullable: true }
        max_age: { type: integer, minimum: 0, nullable: true }
        is_internal: { type: boolean, default: false }
        dry_run: { type: boolean, default: false }

    UpdatePricingCategoryRequest:
      type: object
      description: |
        Mirrors `UpdatePricingCategoryRequest::rules()`. Reparenting (changing
        `product_id`) is not supported via PATCH; create a new category if you
        need to move tiers across products.
      properties:
        name: { type: string, maxLength: 200 }
        type:
          type: string
          enum: [ADULT, CHILD, INFANT, YOUTH, STUDENT, SENIOR, TRAVELLER, EU_CITIZEN, MILITARY, EU_CITIZEN_STUDENT]
        min_age: { type: integer, minimum: 0, nullable: true }
        max_age: { type: integer, minimum: 0, nullable: true }
        is_internal: { type: boolean }
        dry_run: { type: boolean, default: false }

    CreatePricingTierRequest:
      type: object
      required: [pricing_category_id, amount]
      description: |
        Mirrors `CreatePricingTierRequest::rules()`. The actual `pricing_tiers`
        table has no `product_option_id`, `availability_id`, or `name` column;
        all three are accepted as legacy aliases and ignored by the controller.
        Tiers belong to a `PricingCategory` (the named bucket like
        `Adults`/`Children`), which in turn belongs to a Product. `amount`
        is persisted as the `fare` column. `currency` has no per-row column
        and is dropped on persist.
      properties:
        pricing_category_id: { type: string, description: "Required parent `PricingCategory` row." }
        min: { type: integer, minimum: 0, description: "Inclusive lower bound of the headcount band." }
        max: { type: integer, minimum: 0, nullable: true, description: "Inclusive upper bound; null = open-ended." }
        amount: { type: integer, minimum: 0, description: "Persisted as the `fare` column. Minor units." }
        currency: { type: string, minLength: 3, maxLength: 3, description: "Accepted but ignored — no per-row column." }
        name: { type: string, maxLength: 100, description: "Legacy alias accepted for compat — belongs on the parent `PricingCategory`, not the tier. Ignored." }
        product_option_id: { type: string, nullable: true, description: "Legacy alias accepted for compat. Ignored — tiers don't link to ProductOption directly." }
        availability_id: { type: string, nullable: true, description: "Legacy alias accepted for compat. Availability scoping is M:N via the `availability_pricing_tier` pivot, not a column. Ignored." }
        dry_run: { type: boolean, default: false }

    UpdatePricingTierRequest:
      type: object
      description: |
        Mirrors `UpdatePricingTierRequest::rules()`. `pricing_category_id`,
        `min`, `max`, and `amount` (→ `fare`) are persisted; sending
        `pricing_category_id` reparents the tier (404 if the target
        category doesn't exist). `name` is accepted as a legacy alias but
        ignored.
      properties:
        pricing_category_id: { type: string, description: "Reparent the tier under a different PricingCategory." }
        min: { type: integer, minimum: 0 }
        max: { type: integer, minimum: 0, nullable: true }
        amount: { type: integer, minimum: 0, description: "Persisted as `fare`. Minor units." }
        name: { type: string, maxLength: 100, description: "Legacy alias — ignored." }
        dry_run: { type: boolean, default: false }

    CreateExtraRequest:
      type: object
      required: [product_id, name, amount, currency]
      description: |
        Mirrors `CreateExtraRequest::rules()`. The controller maps `name` →
        `title`, `amount` → `fare`, `max_quantity` → (`maximum`,
        `maximum_bookable`) on the row. `currency` is required for parity
        with other create endpoints but has no `extras` column and is
        dropped (currency is tenant-level).
      properties:
        product_id: { type: string, description: "Persisted as the morph (`product_id`, `product_type=Product`)." }
        name: { type: string, maxLength: 200, description: "Persisted as the translatable `title` column." }
        description: { type: string, nullable: true }
        amount: { type: integer, minimum: 0, description: "Persisted as `fare`. Minor units." }
        currency: { type: string, minLength: 3, maxLength: 3, description: "Required for symmetry; not stored." }
        max_quantity: { type: integer, minimum: 0, nullable: true, description: "When set, `maximum` becomes `custom` and the value lands in `maximum_bookable`." }
        dry_run: { type: boolean, default: false }

    UpdateExtraRequest:
      type: object
      description: |
        Mirrors `UpdateExtraRequest::rules()`. Same field-to-column mappings
        as `CreateExtraRequest`.
      properties:
        name: { type: string, maxLength: 200 }
        description: { type: string, nullable: true }
        amount: { type: integer, minimum: 0 }
        max_quantity: { type: integer, minimum: 0, nullable: true }
        dry_run: { type: boolean, default: false }

    CreateQuestionRequest:
      type: object
      required: [product_option_id, label, type]
      description: |
        Mirrors `CreateQuestionRequest::rules()`. The controller maps
        `label` → `question`, `required` → `is_required`, and `type` onto
        the underlying `answer_type` enum via:
        `text → short_text`, `textarea → long_text`, `select → list`,
        `date → date`, `number → number`, `boolean → boolean`. The polymorphic
        `questionable` morph is set to `(ProductOption::class, product_option_id)`.
      properties:
        product_option_id: { type: string, description: "Persisted as `questionable_id` with `questionable_type=ProductOption`." }
        label: { type: string, maxLength: 200, description: "Persisted as the `question` column." }
        type:
          type: string
          enum: [text, textarea, select, date, number, boolean]
          description: "Mapped onto `answer_type` (see schema-level description)."
        required: { type: boolean, default: false, description: "Persisted as `is_required`." }
        options:
          type: array
          items: { type: string }
          description: For type=select
        dry_run: { type: boolean, default: false }

    UpdateQuestionRequest:
      type: object
      description: |
        Mirrors `UpdateQuestionRequest::rules()`. Same `label`→`question`,
        `required`→`is_required`, `type`→`answer_type` mappings as
        `CreateQuestionRequest`.
      properties:
        label: { type: string, maxLength: 200 }
        type:
          type: string
          enum: [text, textarea, select, date, number, boolean]
        required: { type: boolean }
        options:
          type: array
          items: { type: string }
        dry_run: { type: boolean, default: false }

    CreateAvailableGiftCertRequest:
      type: object
      required: [name, amounts, currency]
      description: |
        Mirrors `CreateAvailableGiftCertRequest::rules()`. `currency` is
        accepted for symmetry but not stored (no column on the table).
        `expiration_period_months` persists to the `expiration_period`
        column; the model treats it as MONTHS. `cover_image_url` is
        read-only and not accepted on writes (cover assets go through the
        Paperclip `cover` attachment, not via the CLI today).
      properties:
        name: { type: string, maxLength: 200 }
        amounts:
          type: array
          minItems: 1
          items: { type: integer, minimum: 0, description: "Minor units." }
        currency: { type: string, minLength: 3, maxLength: 3, description: "Required for symmetry; not stored." }
        expiration_period_months: { type: integer, nullable: true, description: "Months. -1 means never expires." }
        dry_run: { type: boolean, default: false }

    UpdateAvailableGiftCertRequest:
      type: object
      description: |
        Mirrors `UpdateAvailableGiftCertRequest::rules()`. `cover_image_url`
        is read-only (not accepted on writes).
      properties:
        name: { type: string, maxLength: 200 }
        amounts:
          type: array
          minItems: 1
          items: { type: integer, minimum: 0 }
        expiration_period_months: { type: integer, nullable: true }
        dry_run: { type: boolean, default: false }

    CreateResourceRequest:
      type: object
      required: [name, type, category]
      properties:
        name: { type: string, maxLength: 200 }
        type: { type: string, maxLength: 200, description: "Free-form label (Sailboat, Senior Guide, …)." }
        category:
          type: string
          enum: [guide, asset, equipment, auxiliary]
        capacity: { type: integer, minimum: 0, nullable: true }
        rating: { type: number, format: float, minimum: 0, nullable: true }
        dry_run: { type: boolean, default: false }

    UpdateResourceRequest:
      type: object
      properties:
        name: { type: string, maxLength: 200 }
        type: { type: string, maxLength: 200 }
        category:
          type: string
          enum: [guide, asset, equipment, auxiliary]
        capacity: { type: integer, minimum: 0, nullable: true }
        rating: { type: number, format: float, minimum: 0, nullable: true }
        dry_run: { type: boolean, default: false }

    AttachResourceRequest:
      type: object
      required: [resource_id]
      description: |
        Attaches a Resource to a ProductOption. `capacity` and `seniority`
        are optional pivot-level overrides; omit to inherit the
        Resource-level defaults.
      properties:
        resource_id: { type: string }
        capacity: { type: integer, minimum: 0, nullable: true, description: "Overrides the Resource's capacity for this specific ProductOption attachment." }
        seniority: { type: integer, minimum: 0, nullable: true }
        dry_run: { type: boolean, default: false }

    CreateLocationRequest:
      type: object
      required: [type, name, address, attach_to, attach_to_id]
      description: |
        Mirrors `CreateLocationRequest::rules()`. Every Location must be
        attached to an owning record; specify which kind via `attach_to`
        (enum) and the id via `attach_to_id`. The controller resolves the
        enum to the underlying polymorphic FQCN — clients never deal with
        Eloquent class names. The schema column is `street_address`;
        `address` is a derived accessor on the model. The controller prefers
        `street_address` when supplied, otherwise falls back to `address`.
        `timezone` and `notes` are accepted but dropped on persist (no
        underlying columns today). 422 if `attach_to_id` doesn't resolve to
        an existing record of the requested kind.
      properties:
        type:
          type: string
          enum: [PRIMARY, START, END, VISITED, SECONDARY]
        name: { type: string, maxLength: 200 }
        address: { type: string, description: "Used as `street_address` when `street_address` is not explicitly supplied." }
        street_address: { type: string, description: "Preferred; persisted directly." }
        city: { type: string }
        country_code: { type: string, minLength: 2, maxLength: 2 }
        postal_code: { type: string, nullable: true }
        region: { type: string, nullable: true }
        latitude: { type: number, format: float, nullable: true }
        longitude: { type: number, format: float, nullable: true }
        google_place_id: { type: string, nullable: true }
        timezone: { type: string, maxLength: 64, nullable: true, description: "Accepted but not stored — no column." }
        notes: { type: string, nullable: true, description: "Accepted but not stored — no column." }
        attach_to:
          type: string
          enum: [product, organisation, partner]
          description: "Kind of record this location belongs to. The CLI never exposes Eloquent FQCNs."
        attach_to_id: { type: string, description: "Id of the `attach_to` record." }
        dry_run: { type: boolean, default: false }

    UpdateLocationRequest:
      type: object
      description: |
        Mirrors `UpdateLocationRequest::rules()`. The controller persists only
        `type`, `name`, `latitude`, `longitude`, `google_place_id`, `region`,
        and (when `address` is provided) `street_address`. `timezone` and
        `notes` are accepted but dropped on persist.
      properties:
        type:
          type: string
          enum: [PRIMARY, START, END, VISITED, SECONDARY]
        name: { type: string, maxLength: 200 }
        address: { type: string, description: "Persisted as `street_address` when supplied." }
        latitude: { type: number, format: float, nullable: true }
        longitude: { type: number, format: float, nullable: true }
        google_place_id: { type: string, nullable: true }
        timezone: { type: string, maxLength: 64, nullable: true, description: "Accepted but not stored." }
        notes: { type: string, nullable: true, description: "Accepted but not stored." }
        dry_run: { type: boolean, default: false }
