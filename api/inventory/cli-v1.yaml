        - name: email
          in: query
          schema: { type: string, format: email }
        - name: country
          in: query
          schema: { type: string, description: "ISO 3166-1 alpha-2" }
      responses:
        "200":
          description: Page of customers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerPage"
        "401": { $ref: "#/components/responses/Unauthenticated" }

