        "404": { $ref: "#/components/responses/NotFound" }

  /bookings/{id}/cancel:
    post:
      operationId: cancelBooking
      summary: Cancel a booking
      description: |
        External side effects: Stripe (refund per `refund_policy`), mailer
        (when `notify_customer: true`). On dry-run, returns the cancellation
        policy preview + estimated refund without contacting Stripe or
        sending mail.
      tags: [Bookings]
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelBookingRequest"
      responses:
        "200":
          description: Cancelled (or dry-run preview)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/MutationResult"
                          - type: object
                            properties:
                              refund_amount: { type: integer }
                              policy_applied: { type: string }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /bookings/{id}/refund:
    post:
      operationId: refundBooking
      summary: Refund a booking transaction (full or partial)
      description: "External side effects: Stripe, mailer."
