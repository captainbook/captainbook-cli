openapi: 3.1.0
info:
  title: CaptainBook Inventory CLI API
  version: 1.0.0
  description: |
    Internal HTTP JSON API serving the CaptainBook inventory CLI client
    (which lives in a separate repository). Primary consumer is Claude Code
    piloting the CLI on behalf of supplier-tenant operators and CB Customer
    Success engineers.

    ## Conventions

    - **Tenant resolution:** all endpoints mount under the tenant subdomain
      `{tenant_slug}.captainbook.io/api/v1/cli/*`. Tenant context is initialised via
      `Stancl\Tenancy\Middleware\InitializeTenancyByDomainOrSubdomain`,
      mirroring Octo and the Statistics API. There is no header-based or
      query-param tenant override.
    - **Auth:** Sanctum personal-access-token in `Authorization: Bearer <token>`.
      Per-token `expires_at` is enforced framework-side by Sanctum 4's
      `Guard::isValidAccessToken()`.
    - **Money:** integer minor units (`15000` = 150.00 EUR; `15000` = 150 JPY).
      Currency is the tenant's currency, surfaced via `meta.currency`.
    - **Translatable fields:** API responses always return the English
      translation of Spatie-translatable columns (matches the Statistics API
      contract — see commit `e51d27658`).
    - **Idempotency:** every mutating endpoint accepts an
      `Idempotency-Key: <UUIDv7>` request header. The `request_hash` for
      replay matching is SHA-256 of the canonical-JSON (RFC 8785) of the
      request body, excluding the `dry_run` field. See
      `app/Support/Cli/Canonicalize.php` (vendored, fuzz-tested against
      `canonicalize` npm reference).
    - **Dry-run:** every mutating endpoint accepts `dry_run: true` in the
      body. The handler runs validation, authorization, and computes the
      diff, but suppresses all side effects (DB transaction rolled back,
      jobs not dispatched, mail not sent, Stripe not called). Response
      includes `data.diff` and `data.would_apply: true`. Dry-run always
      returns `200 OK` regardless of the real-run status code — even on
      create endpoints (which return `201 Created` for real writes),
      because nothing was created.
    - **Pagination:** all list endpoints use forward-only cursor pagination.
      Default `limit=50`, max `200`. Backward pagination is Phase 2.
    - **Throttle:** plan-based (60 req/min on starter, 240 on ultra).
    - **Rate limit:** every endpoint may return `429 Rate Limited` with a
      `Retry-After` header (seconds). Plan-based: 60/min on starter, 240/min on
      ultra/corporate. The 429 response is omitted from individual operation
      definitions to keep the spec terse but applies universally; consult the
      `RateLimited` shared response for the body shape and stable `code`.
    - **Date-range filters (`from`/`to` on list endpoints):** half-open interval
      `[from, to)` — `from` is inclusive, `to` is exclusive. Example:
      `?from=2026-04-01&to=2026-05-01` matches April 2026 in full and excludes
      May 1. Date-typed filters (e.g. `Booking.starts_at`) are interpreted in
      the tenant's configured timezone (`Organisation.timezone`). Date-time-typed
      filters (e.g. `Transaction.created_at`) are UTC unless the supplied value
      carries an explicit `±HH:MM` offset.

    ## What this API is NOT

    - Not the public reseller API (see `/api/v1/suppliers/...` and Octo).
    - Not the customer-facing widget API.
    - Not for end-traveler self-service.

    ## Status

    Phase 1 surface. The endpoints listed here are the V1 contract; Phase 2
    will extend with full CRUD, internal notes on bookings, bulk booking
    operations, and a localized render-preview for resend confirmation.

  contact:
    name: CaptainBook Engineering

servers:
  - url: "{scheme}://{tenant_slug}.captainbook.io/api/v1/cli"
    description: Tenant subdomain
    variables:
      scheme:
        default: https
      tenant_slug:
        default: demo

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Token validation and identity probe
  - name: Products
    description: Product catalog and CRUD (soft-deletable)
  - name: ProductOptions
    description: Product option (variant) catalog and CRUD (soft-deletable)
  - name: Categories
    description: Product category catalog (read-only; managed centrally)
  - name: Availabilities
    description: Per-date capacity reads, single update, and async bulk update
  - name: PricingTiers
    description: Pricing tier catalog and CRUD (soft-deletable)
  - name: Locations
    description: Meeting / start / end location catalog and CRUD
  - name: Media
    description: Product image and document attachments
  - name: Discounts
    description: Discount catalog, apply, and cancel
  - name: GiftCertificates
    description: Sellable gift-cert SKUs and issued instances (issue / void / resend)
  - name: Bookings
    description: Booking reads + cancel / refund / comp commands
  - name: Transactions
    description: Booking transaction reads
  - name: Customers
    description: Customer catalog (vendor `Customer` model)
  - name: Guests
    description: Per-booking guest reads + edits
  - name: Extras
    description: Extras / add-ons catalog and CRUD (soft-deletable)
  - name: Questions
    description: Booking questions catalog and CRUD (soft-deletable)
  - name: Notifications
    description: Customer notification commands

paths:
  /whoami:
    get:
      operationId: whoami
      summary: Identity probe
      description: |
        Validates the bearer token and returns the actor + tenant context.
        The CLI client uses this on `cb login` to verify credentials.
      tags: [Auth]
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WhoamiData"
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /products:
    get:
      operationId: listProducts
      summary: List products
      tags: [Products]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/IncludeTrashed"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Q"
        - $ref: "#/components/parameters/Since"
        - name: status
          in: query
          schema: { type: string, enum: [draft, published, archived] }
        - name: category
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Page of products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductPage"
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "429": { $ref: "#/components/responses/RateLimited" }

    post:
      operationId: createProduct
      summary: Create a product
      description: |
        Creates a Product and mirrors the supplier-side metadata to
        `central_products` via `App\Observers\ProductObserver`. The
        controller enforces the same implicit-override rules the Livewire
        form runs (see `app/Livewire/Product/Edit.php::update()`):

        - When `must_validate_cancellation_policy` is `false` (default), both
          `cancellation_policy` and `cancellation_policy_link` are nulled,
          even if the caller supplied them. Set
          `must_validate_cancellation_policy: true` to retain the policy
          fields.
        - When `is_private` is `false`, `is_priced_per_person` is forced to
          `true` and `use_alternate_tier_pricing` to `false`. Shared
          experiences must price per traveler.

        After persistence the controller calls `Product::updateCanBeSold()`
        which re-derives the `can_be_sold` column. New products have no
        Availabilities yet, so the inventory cascade jobs that fire on
        update do not run on create.
      tags: [Products]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/MutationResult"
                          - type: object
                            properties:
                              product: { $ref: "#/components/schemas/Product" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /products/{id}:
    get:
      operationId: showProduct
      summary: Show a product
      tags: [Products]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Product" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

    delete:
      operationId: deleteProduct
      summary: Delete a product
      description: |
        Soft-deletes the Product (sets `deleted_at`). The row remains in the database; list endpoints exclude it by default. Restore via `POST /products/{id}/restore`.

        **Cascade behavior** (per `Product::$cascadeDeletes = ['options']`):
        soft-delete cascades to product options. Each soft-deleted option
        in turn cascades to its `virtualProductOption` and `discount`.
        PricingTiers and Availabilities are NOT cascaded by Product deletion —
        they remain readable and can be cleaned up separately.
      tags: [Products]
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204":
          description: Soft-deleted
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
    patch:
      operationId: updateProduct
      summary: Update a product
      description: |
        Updates the Product and runs the same side-effect chain the Livewire
        form does in `app/Livewire/Product/Edit.php::update()`. The whole
        flow runs inside a single DB transaction; partial failures roll back.

        **Implicit overrides** (applied before persistence — same rules as
        `POST /products`):

        - `must_validate_cancellation_policy=false` → both
          `cancellation_policy` and `cancellation_policy_link` are nulled.
        - Effective `is_private=false` → `is_priced_per_person` is forced
          to `true` and `use_alternate_tier_pricing` to `false`.

        **Cascading side effects** (only fire when the relevant input
        actually changed; under dry-run they're surfaced via the
        `MutationResult.side_effects` array rather than executed):

        - `is_private` toggled — every Availability of every related
          ProductOption is bulk-updated to match, then dispatches
          `UpdateBookedQuantityJob`, `UpdateCumulativeCapacityJob`,
          `UpdateIsFullyBookedJob`, `UpdateIsOpenForBookingJob`,
          `UpdateAvailableResourcesCountJob`,
          `UpdateMaxHostableGuestsNumberJob`, and `UpdateVacanciesJob`
          per chunk of 1000 Availabilities.
        - `schedule_type` switched to `date` — Availability `from`/`to`
          windows are collapsed to full-day spans and any
          `resourceables` rows for the related ProductOptions are deleted
          (DATE products are inherently resource-less).
        - `capacity` changed (only when the `ProductLevelCapacity` feature
          flag is on) — cascades to all options, then to all future
          Availabilities, and re-runs the inventory derivation jobs.
          Deferred via `defer()` so the response returns before the heavy
          fan-out runs.

        Finally, `Product::updateCanBeSold()` re-derives the canonical
        `can_be_sold` column, matching the UI flow.
      tags: [Products]
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: Updated (or dry-run preview)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/MutationResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /product-options:
    get:
      operationId: listProductOptions
      summary: List product options
      tags: [ProductOptions]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/IncludeTrashed"
        - $ref: "#/components/parameters/Cursor"
        - name: product_id
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Page of product options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductOptionPage"
        "401": { $ref: "#/components/responses/Unauthenticated" }

    post:
      operationId: createProductOption
      summary: Create a product option
      tags: [ProductOptions]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductOptionRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/MutationResult"
                          - type: object
                            properties:
                              product_option: { $ref: "#/components/schemas/ProductOption" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /product-options/{id}:
    get:
      operationId: showProductOption
      summary: Show a product option
      tags: [ProductOptions]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Product option
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/ProductOption" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

    delete:
      operationId: deleteProductOption
      summary: Delete a product option
      description: |
        Soft-deletes the ProductOption (sets `deleted_at`). The row remains in the database; list endpoints exclude it by default. Restore via `POST /product-options/{id}/restore`. Cascades to `virtualProductOption` and `discount` via `CascadeSoftDeletes` (per `ProductOption::$cascadeDeletes`). PricingTiers and Availabilities owned by this option are NOT cascaded — handle them separately.
      tags: [ProductOptions]
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204":
          description: Soft-deleted
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
    patch:
      operationId: updateProductOption
      summary: Update a product option
      tags: [ProductOptions]
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductOptionRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/MutationResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /availabilities:
    get:
      operationId: listAvailabilities
      summary: List availabilities
      tags: [Availabilities]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Since"
        - name: product_option_id
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
        - name: has_capacity
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Page of availabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilityPage"
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /availabilities/{id}:
    get:
      operationId: showAvailability
      summary: Show an availability
      tags: [Availabilities]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Availability
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Availability" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateAvailability
      summary: Update a single availability row
      description: |
        Updates capacity and/or status on a single availability. For multi-row
        updates spanning a date range, use `POST /availabilities/bulk-update`.
      tags: [Availabilities]
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAvailabilityRequest"
      responses:
        "200":
          description: Updated (or dry-run preview)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/MutationResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      operationId: deleteAvailability
      summary: Delete a single availability row
      description: |
        Soft-deletes the availability (sets `deleted_at`). The row remains in
        the database; list endpoints exclude it by default. Returns 409
        `AVAILABILITY_HAS_CONFIRMED_BOOKING` if any confirmed Booking is
        attached to this availability — cancel or move the bookings first.

        For multi-row deletes spanning a date range, use
        `POST /availabilities/bulk-delete`.

        Dry-run (`dry_run: true` in the JSON body) returns 200 with
        `would_apply: true` and the row in `diff.before`; no row is deleted.
        The 409 confirmed-booking precheck still runs in dry-run.
      tags: [Availabilities]
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204":
          description: Deleted
        "200":
          description: Dry-run preview (no row deleted)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/MutationResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: |
            Idempotency conflict, OR
            `AVAILABILITY_HAS_CONFIRMED_BOOKING` — the availability has at
            least one confirmed Booking attached. `error.details.availability_id`
            echoes the path id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /availability-rules:
    post:
      operationId: createAvailabilityRule
      summary: Generate availabilities from a recurrence rule (asynchronous)
      description: |
        One-shot generator: takes a weekday-based recurrence rule and fans
        out to materialize Availability rows by dispatching the existing
        `CreateBatchAvailabilityJob` (same job the dashboard uses). NOT a
        persistent entity — the rule itself is not stored. Once the job
        runs, materialized rows are queryable via `GET /availabilities`.

        **Schedule type semantics:**
        - For `datetime` products, `start_time` and `end_time` are required.
        - For `date`-only products, both are ignored; rows span full days.

        **Dry-run:** returns `total_matched` and a sample of the first 3
        `[from, to]` pairs so an agent can preview "this rule would create
        N Saturday slots" before committing.

        **No-op:** if the date range × weekdays produces zero matches, the
        endpoint returns 200 with `status=no_op` and skips the dispatch.
        Otherwise returns 202 with `status=queued`.

        **Idempotency:** standard CLI idempotency — replay-with-same-body
        rebroadcasts the cached response without re-dispatching the job.
      tags: [Availabilities]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAvailabilityRuleRequest"
      responses:
        "202":
          description: Queued — the recurrence job has been dispatched.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/MutationResult"
                          - type: object
                            properties:
                              status: { type: string, enum: [queued] }
                              total_matched: { type: integer, description: "Number of (date, time) pairs that will be materialized." }
                              rule:
                                $ref: "#/components/schemas/AvailabilityRulePreview"
        "200":
          description: |
            No-op (zero matches), OR dry-run preview. `would_apply` differentiates.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/MutationResult"
                          - type: object
                            properties:
                              status: { type: string, enum: [no_op] }
                              total_matched: { type: integer }
                              rule:
                                $ref: "#/components/schemas/AvailabilityRulePreview"
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /availabilities/bulk-update:
    post:
      operationId: bulkUpdateAvailabilities
      summary: Bulk update availabilities across a date range (asynchronous)
      description: |
        Update capacity, status, and/or pricing-tier overrides for every
        availability of one product option within a date range. Used for
        weather cancellations, seasonal capacity shifts, schedule changes.

        **Asynchronous.** On commit the server (a) creates a
        `BulkAvailabilityUpdate` audit row capturing the filters and new
        values, then (b) chunks the matched availability IDs into batches of
        ~1000 and dispatches `BulkAvailabilityUpdateJob` instances on the
        `inventory` queue. The HTTP response returns 202 Accepted with
        `bulk_update_id` and `total_matched` (the count of *queued* rows, not
        completed). Actual processing happens in the background; there is no
        in-band completion signal in V1.

        Dry-run (`dry_run: true`) returns 200 with `total_matched` and no
        side effects — no audit row, no jobs dispatched.
      tags: [Availabilities]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUpdateAvailabilityRequest"
      responses:
        "202":
          description: |
            Accepted. The server has created a `BulkAvailabilityUpdate` audit
            row and queued `BulkAvailabilityUpdateJob` instances on the
            `inventory` queue. Actual updates run asynchronously in the
            background. There is no in-band completion signal in V1 — clients
            confirm by polling `/availabilities` or by inspecting the
            availabilities the audit row's `filters_json` matched. The Phase 2
            polling endpoint will be `GET /availabilities/bulk-updates/{id}`.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/MutationResult"
                          - type: object
                            properties:
                              bulk_update_id:
                                type: string
                                description: ID of the `BulkAvailabilityUpdate` audit row
                              total_matched:
                                type: integer
                                description: Number of availability rows the filter matched and queued for update; not a count of completed updates
                              status:
                                type: string
                                enum: [queued]
                                description: V1 only emits "queued"; Phase 2 will add "completed", "partially_completed"
        "200":
          description: |
            Dry-run preview (no jobs dispatched), OR no-op when the filter
            matched zero availability rows (no audit row created, no jobs
            queued). The no-op response carries `status: "no_op"` and
            `bulk_update_id: null` — clients should NOT poll for completion
            in that case.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/MutationResult"
                          - type: object
                            properties:
                              total_matched: { type: integer }
                              status:
                                type: string
                                enum: [preview, no_op]
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /availabilities/bulk-delete:
    post:
      operationId: bulkDeleteAvailabilities
      summary: Bulk soft-delete availabilities across a date range (synchronous)
      description: |
        Soft-deletes every availability of one ProductOption inside
        `[from, to)` in a single UPDATE on `deleted_at`. Synchronous — the
        response carries the actual `total_deleted` count, no polling
        required.

        **All-or-nothing on confirmed bookings.** Before any rows are
        touched, the server scans the matched range for availabilities with
        a confirmed Booking attached. If any are found the entire request
        is rejected with 409 `AVAILABILITY_HAS_CONFIRMED_BOOKING` and
        `error.details` carries `total_blocked` plus a sample of up to 20
        availability ids. Operator must cancel/move those bookings or
        narrow the range and retry.

        **Cascade caveat.** Soft-delete is a single bulk UPDATE that
        bypasses model events, so the `Availability → pricingTiers`
        cascade does NOT run. This is intentional: pricing tiers are M:N
        with availabilities, so cascading from one row would soft-delete
        tier rows still referenced by other availabilities.

        **No-op:** if the filter matches zero rows, returns 200 with
        `total_deleted: 0` and `status: "no_op"`.

        **Dry-run:** returns 200 with `total_matched`, `status: "preview"`
        and no side effects. The 409 confirmed-booking precheck still runs.
      tags: [Availabilities]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteAvailabilityRequest"
      responses:
        "200":
          description: |
            Deleted (real call), no-op (zero matches), or dry-run preview.
            `data.status` differentiates: `deleted` | `no_op` | `preview`.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/MutationResult"
                          - type: object
                            properties:
                              total_matched:
                                type: integer
                                description: Number of rows the filter matched (present on dry-run).
                              total_deleted:
                                type: integer
                                description: Number of rows soft-deleted (present on real call / no-op).
                              status:
                                type: string
                                enum: [preview, no_op, deleted]
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "409":
          description: |
            Idempotency conflict, OR
            `AVAILABILITY_HAS_CONFIRMED_BOOKING` — at least one row in the
            matched range has a confirmed Booking. `error.details` carries
            `total_blocked` (count) and `sample_availability_ids` (up to 20
            ids). No rows are deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": { $ref: "#/components/responses/ValidationError" }

