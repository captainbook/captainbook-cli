openapi: 3.1.0
info:
  title: CaptainBook Inventory CLI API
  version: 1.0.0
  description: |
    Internal HTTP JSON API serving the CaptainBook inventory CLI client
    (which lives in a separate repository). Primary consumer is Claude Code
    piloting the CLI on behalf of supplier-tenant operators and CB Customer
    Success engineers.

    ## Conventions

    - **Tenant resolution:** all endpoints mount under the tenant subdomain
      `{tenant_slug}.captainbook.io/api/v1/cli/*`. Tenant context is initialised via
      `Stancl\Tenancy\Middleware\InitializeTenancyByDomainOrSubdomain`,
      mirroring Octo and the Statistics API. There is no header-based or
      query-param tenant override.
    - **Auth:** Sanctum personal-access-token in `Authorization: Bearer <token>`.
      Per-token `expires_at` is enforced framework-side by Sanctum 4's
      `Guard::isValidAccessToken()`.
    - **Money:** integer minor units (`15000` = 150.00 EUR; `15000` = 150 JPY).
      Currency is the tenant's currency, surfaced via `meta.currency`.
    - **Translatable fields:** API responses always return the English
      translation of Spatie-translatable columns (matches the Statistics API
      contract — see commit `e51d27658`).
    - **Idempotency:** every mutating endpoint accepts an
      `Idempotency-Key: <UUIDv7>` request header. The `request_hash` for
      replay matching is SHA-256 of the canonical-JSON (RFC 8785) of the
      request body, excluding the `dry_run` field. See
      `app/Support/Cli/Canonicalize.php` (vendored, fuzz-tested against
      `canonicalize` npm reference).
    - **Dry-run:** every mutating endpoint accepts `dry_run: true` in the
      body. The handler runs validation, authorization, and computes the
      diff, but suppresses all side effects (DB transaction rolled back,
      jobs not dispatched, mail not sent, Stripe not called). Response
      includes `data.diff` and `data.would_apply: true`.
    - **Pagination:** all list endpoints use forward-only cursor pagination.
      Default `limit=50`, max `200`. Backward pagination is Phase 2.
    - **Throttle:** plan-based (60 req/min on starter, 240 on ultra).
    - **Rate limit:** every endpoint may return `429 Rate Limited` with a
      `Retry-After` header (seconds). Plan-based: 60/min on starter, 240/min on
      ultra/corporate. The 429 response is omitted from individual operation
      definitions to keep the spec terse but applies universally; consult the
      `RateLimited` shared response for the body shape and stable `code`.
    - **Date-range filters (`from`/`to` on list endpoints):** half-open interval
      `[from, to)` — `from` is inclusive, `to` is exclusive. Example:
      `?from=2026-04-01&to=2026-05-01` matches April 2026 in full and excludes
      May 1. Date-typed filters (e.g. `Booking.starts_at`) are interpreted in
      the tenant's configured timezone (`Organisation.timezone`). Date-time-typed
      filters (e.g. `Transaction.created_at`) are UTC unless the supplied value
      carries an explicit `±HH:MM` offset.

    ## What this API is NOT

    - Not the public reseller API (see `/api/v1/suppliers/...` and Octo).
    - Not the customer-facing widget API.
    - Not for end-traveler self-service.

    ## Status

    Phase 1 surface. The endpoints listed here are the V1 contract; Phase 2
    will extend with full CRUD, internal notes on bookings, bulk booking
    operations, and a localized render-preview for resend confirmation.

  contact:
    name: CaptainBook Engineering

servers:
  - url: "{scheme}://{tenant_slug}.captainbook.io/api/v1/cli"
    description: Tenant subdomain
    variables:
      scheme:
        default: https
      tenant_slug:
        default: demo

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Token validation and identity probe
  - name: Products
    description: Product catalog and CRUD (soft-deletable)
  - name: ProductOptions
    description: Product option (variant) catalog and CRUD (soft-deletable)
  - name: Categories
    description: Product category catalog and CRUD
  - name: Availabilities
    description: Per-date capacity reads, single update, and async bulk update
  - name: PricingTiers
    description: Pricing tier catalog and CRUD (soft-deletable)
  - name: Locations
    description: Meeting / start / end location catalog and CRUD
  - name: Media
    description: Product image and document attachments
  - name: Discounts
    description: Discount catalog, apply, and cancel
  - name: GiftCertificates
    description: Sellable gift-cert SKUs and issued instances (issue / void / resend)
  - name: Bookings
    description: Booking reads + cancel / refund / comp commands
  - name: Transactions
    description: Booking transaction reads
  - name: Customers
    description: Customer catalog (vendor `Customer` model)
  - name: Guests
    description: Per-booking guest reads + edits
  - name: Extras
    description: Extras / add-ons catalog and CRUD (soft-deletable)
  - name: Questions
    description: Booking questions catalog and CRUD (soft-deletable)
  - name: Notifications
    description: Customer notification commands

paths:
  /whoami:
    get:
      operationId: whoami
      summary: Identity probe
      description: |
        Validates the bearer token and returns the actor + tenant context.
        The CLI client uses this on `cb login` to verify credentials.
      tags: [Auth]
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WhoamiData"
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /products:
    get:
      operationId: listProducts
      summary: List products
      tags: [Products]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/IncludeTrashed"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Q"
        - $ref: "#/components/parameters/Since"
        - name: status
          in: query
          schema: { type: string, enum: [draft, published, archived] }
        - name: category
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Page of products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductPage"
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "429": { $ref: "#/components/responses/RateLimited" }

    post:
      operationId: createProduct
      summary: Create a product
      tags: [Products]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Created (or dry-run preview)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/MutationResult"
                          - type: object
                            properties:
                              product: { $ref: "#/components/schemas/Product" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /products/{id}:
    get:
      operationId: showProduct
      summary: Show a product
      tags: [Products]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Product" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

    delete:
      operationId: deleteProduct
      summary: Delete a product
      description: |
        Soft-deletes the Product (sets `deleted_at`). The row remains in the database; list endpoints exclude it by default. Restore via `POST /products/{id}/restore`.

        **Cascade behavior** (per `Product::$cascadeDeletes = ['options']`):
        soft-delete cascades to product options. Each soft-deleted option
        in turn cascades to its `virtualProductOption` and `discount`.
        PricingTiers and Availabilities are NOT cascaded by Product deletion —
        they remain readable and can be cleaned up separately.
      tags: [Products]
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204":
          description: Soft-deleted
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
    patch:
      operationId: updateProduct
      summary: Update a product
      tags: [Products]
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: Updated (or dry-run preview)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/MutationResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /product-options:
    get:
      operationId: listProductOptions
      summary: List product options
      tags: [ProductOptions]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/IncludeTrashed"
        - $ref: "#/components/parameters/Cursor"
        - name: product_id
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [draft, published, archived] }
      responses:
        "200":
          description: Page of product options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductOptionPage"
        "401": { $ref: "#/components/responses/Unauthenticated" }

    post:
      operationId: createProductOption
      summary: Create a product option
      tags: [ProductOptions]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductOptionRequest"
      responses:
        "201":
          description: Created (or dry-run preview)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/MutationResult"
                          - type: object
                            properties:
                              product_option: { $ref: "#/components/schemas/ProductOption" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /product-options/{id}:
    get:
      operationId: showProductOption
      summary: Show a product option
      tags: [ProductOptions]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Product option
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/ProductOption" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

    delete:
      operationId: deleteProductOption
      summary: Delete a product option
      description: |
        Soft-deletes the ProductOption (sets `deleted_at`). The row remains in the database; list endpoints exclude it by default. Restore via `POST /product-options/{id}/restore`. Cascades to `virtualProductOption` and `discount` via `CascadeSoftDeletes` (per `ProductOption::$cascadeDeletes`). PricingTiers and Availabilities owned by this option are NOT cascaded — handle them separately.
      tags: [ProductOptions]
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204":
          description: Soft-deleted
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
    patch:
      operationId: updateProductOption
      summary: Update a product option
      tags: [ProductOptions]
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductOptionRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/MutationResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /availabilities:
    get:
      operationId: listAvailabilities
      summary: List availabilities
      tags: [Availabilities]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Since"
        - name: product_option_id
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
        - name: has_capacity
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Page of availabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilityPage"
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /availabilities/{id}:
    get:
      operationId: showAvailability
      summary: Show an availability
      tags: [Availabilities]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Availability
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Availability" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateAvailability
      summary: Update a single availability row
      description: |
        Updates capacity and/or status on a single availability. For multi-row
        updates spanning a date range, use `POST /availabilities/bulk-update`.
      tags: [Availabilities]
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAvailabilityRequest"
      responses:
        "200":
          description: Updated (or dry-run preview)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/MutationResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /availabilities/bulk-update:
    post:
      operationId: bulkUpdateAvailabilities
      summary: Bulk update availabilities across a date range (asynchronous)
      description: |
        Update capacity, status, and/or pricing-tier overrides for every
        availability of one product option within a date range. Used for
        weather cancellations, seasonal capacity shifts, schedule changes.

        **Asynchronous.** On commit the server (a) creates a
        `BulkAvailabilityUpdate` audit row capturing the filters and new
        values, then (b) chunks the matched availability IDs into batches of
        ~1000 and dispatches `BulkAvailabilityUpdateJob` instances on the
        `inventory` queue. The HTTP response returns 202 Accepted with
        `bulk_update_id` and `total_matched` (the count of *queued* rows, not
        completed). Actual processing happens in the background; there is no
        in-band completion signal in V1.

        Dry-run (`dry_run: true`) returns 200 with `total_matched` and no
        side effects — no audit row, no jobs dispatched.
      tags: [Availabilities]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUpdateAvailabilityRequest"
      responses:
        "202":
          description: |
            Accepted. The server has created a `BulkAvailabilityUpdate` audit
            row and queued `BulkAvailabilityUpdateJob` instances on the
            `inventory` queue. Actual updates run asynchronously in the
            background. There is no in-band completion signal in V1 — clients
            confirm by polling `/availabilities` or by inspecting the
            availabilities the audit row's `filters_json` matched. The Phase 2
            polling endpoint will be `GET /availabilities/bulk-updates/{id}`.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/MutationResult"
                          - type: object
                            properties:
                              bulk_update_id:
                                type: string
                                description: ID of the `BulkAvailabilityUpdate` audit row
                              total_matched:
                                type: integer
                                description: Number of availability rows the filter matched and queued for update; not a count of completed updates
                              status:
                                type: string
                                enum: [queued]
                                description: V1 only emits "queued"; Phase 2 will add "completed", "partially_completed"
        "200":
          description: Dry-run preview (no jobs dispatched)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/MutationResult"
                          - type: object
                            properties:
                              total_matched: { type: integer }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /pricing-tiers:
    get:
      operationId: listPricingTiers
      summary: List pricing tiers
      tags: [PricingTiers]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/IncludeTrashed"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Since"
        - name: product_option_id
          in: query
          schema: { type: string }
        - name: availability_id
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Page of pricing tiers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingTierPage"
        "401": { $ref: "#/components/responses/Unauthenticated" }

    post:
      operationId: createPricingTier
      summary: Create a pricing tier
      tags: [PricingTiers]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePricingTierRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/MutationResult"
                          - type: object
                            properties:
                              pricing_tier: { $ref: "#/components/schemas/PricingTier" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /pricing-tiers/{id}:
    get:
      operationId: showPricingTier
      summary: Show a pricing tier
      tags: [PricingTiers]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Pricing tier
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/PricingTier" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

    delete:
      operationId: deletePricingTier
      summary: Delete a pricing tier (soft-delete)
      description: |
        Soft-deletes the pricing tier (sets `deleted_at`). Existing booking
        references stay valid; the tier no longer appears in active lists.
        Restore via `POST /pricing-tiers/{id}/restore`.

        **WARNING — data-loss adjacency:** `PricingTier::$cascadeDeletes = ['availabilities']`. Soft-deleting a tier soft-deletes every Availability rendered against it. Calendar data for that tier disappears. Always run `--dry-run` first; consider exporting affected availabilities before delete.
      tags: [PricingTiers]
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204":
          description: Soft-deleted
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }

    patch:
      operationId: updatePricingTier
      summary: Update a pricing tier
      tags: [PricingTiers]
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePricingTierRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/MutationResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /discounts:
    get:
      operationId: listDiscounts
      summary: List discounts
      tags: [Discounts]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Since"
        - $ref: "#/components/parameters/IncludeTrashed"
        - name: code
          in: query
          schema: { type: string, description: "Filter by promo code" }
        - name: product_option_id
          in: query
          schema: { type: string, nullable: true, description: "Use 'null' to filter for global discounts" }
        - name: auto_apply
          in: query
          schema: { type: boolean }
        - name: valid_at
          in: query
          description: |
            Returns discounts whose `validity_start <= valid_at < validity_end`
            (or where `validity_end IS NULL`). Useful for "what discounts are
            currently valid?".
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Page of discounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscountPage"
        "401": { $ref: "#/components/responses/Unauthenticated" }
    post:
      operationId: createDiscount
      summary: Create a discount
      tags: [Discounts]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDiscountRequest"
      responses:
        "201":
          description: Created (or dry-run preview)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/MutationResult"
                          - type: object
                            properties:
                              discount: { $ref: "#/components/schemas/Discount" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /discounts/{id}:
    get:
      operationId: showDiscount
      summary: Show a discount
      tags: [Discounts]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Discount
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Discount" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteDiscount
      summary: Delete a discount (soft-delete)
      description: |
        Soft-deletes the discount (sets `deleted_at`). Existing booking
        applications via the `booking_discount` pivot stay valid; the
        discount no longer applies to new bookings or future redemptions.
        Restore via `POST /discounts/{id}/restore`. Soft-deletion IS the
        cancellation operation for discounts.
      tags: [Discounts]
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: dry_run
          in: query
          schema: { type: boolean, default: false }
      responses:
        "204":
          description: Soft-deleted
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }

  /discounts/{id}/apply:
    post:
      operationId: applyDiscount
      summary: Apply a discount to a booking
      description: |
        Creates a `BookingDiscount` pivot row attaching this discount to the
        booking with `applied_at = now()`. Recomputes the booking's
        `discount_total`. Does not touch Stripe; if a refund is owed for the
        difference, call `POST /bookings/{id}/refund` separately.

        Returns 409 with `code: DISCOUNT_NOT_APPLICABLE` if the booking is
        already in a non-applicable state (cancelled, expired) or if the
        discount's `validity_start`/`validity_end` window doesn't include
        the booking date, or if the discount is scoped to a different
        product_option_id, or if `nb_offers` is exhausted.
      tags: [Discounts]
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [booking_id]
              properties:
                booking_id: { type: string }
                dry_run: { type: boolean, default: false }
      responses:
        "200":
          description: Applied (or dry-run preview)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/MutationResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/IdempotencyConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /gift-certs/available:
