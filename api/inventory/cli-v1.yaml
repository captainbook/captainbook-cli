      summary: List pricing tiers
      description: |
        **Filtering:** scope by `product_id` only. `product_option_id` and
        `availability_id` filters were dropped: pricing_categories.product_option_id
        was renamed to product_id in 2022 (tiers scope by product, not by
        product_option), and pricing_tiers ↔ availabilities is M:N via the
        `availability_pricing_tier` pivot, not a direct FK on the row.
        Re-introducing per-option or per-availability filters needs a
        deliberate semantic call (does "tiers for an option" mean tiers
        of the option's product? always shared across siblings?) and is
        deferred. Listed here for clients that have a `product_id` and
        want the full set of tiers under it.
