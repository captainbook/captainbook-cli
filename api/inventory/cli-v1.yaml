          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Customer" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

  /bookings:
    get:
      operationId: listBookings
      summary: List bookings
      tags: [Bookings]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Q"
        - name: booking_status
          in: query
          description: |
            Filter by computed status. Server translates to SQL conditions on
            `confirmed_at`/`cancelled_at`/`expires_at` (status is an accessor,
            not a column).
          schema: { type: string, enum: [ON_HOLD, CONFIRMED, EXPIRED, CANCELLED] }
        - name: from
          in: query
          description: Booking start date >= this
          schema: { type: string, format: date }
        - name: to
          in: query
          description: Booking start date <= this
          schema: { type: string, format: date }
        - name: customer_email
          in: query
          schema: { type: string, format: email }
        - name: reference
          in: query
          schema: { type: string }
        - name: product_option_id
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Page of bookings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingPage"
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /bookings/{id}:
    get:
      operationId: showBooking
      summary: Show a booking
      description: Inlines guests and most-recent transactions.
      tags: [Bookings]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Booking
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
