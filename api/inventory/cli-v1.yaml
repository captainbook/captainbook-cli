components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum PAT
      description: |
        Sanctum personal-access-token. Issued via the Provider panel (UI).
        Tenant-scoped; attempting to use a token outside its tenant returns 401.
        Per-token `expires_at` enforced by Sanctum 4 framework-side.

        **Abilities (token scopes).** Tokens carry an `abilities` array.
        Endpoints check abilities at the route layer; missing abilities → 403.

        | Ability     | Required for                                                           |
        | ----------- | ---------------------------------------------------------------------- |
        | `cli:read`  | Always granted alongside read endpoints; not enforced explicitly.      |
        | `cli:write` | Mutating endpoints: availabilities update / delete / bulk-update / bulk-delete, discounts CRUD + apply, gift-certs issue / void / resend, guest update. |
        | `cli:cs`    | CS-only sensitive ops: booking comp, booking refund, confirmation resend. Issued only to CS engineers. |

        Recommended issuance: a dedicated `cli:read` token for scripted
        reporting, a `cli:read` + `cli:write` token for inventory editors, and
        a `cli:read` + `cli:write` + `cli:cs` token for CS engineers.

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      description: Resource ID (ULID, UUID, or numeric, depending on resource)
      schema:
        type: string
    Limit:
      name: limit
      in: query
      description: Page size (1-200, default 50)
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Cursor:
      name: cursor
      in: query
      description: Opaque cursor returned by previous page's `pagination.cursor_next`
      schema:
        type: string
    Q:
      name: q
      in: query
      description: Free-text search across primary string fields (name, email, reference)
      schema:
        type: string
    Since:
      name: since
      in: query
      description: ISO 8601 lower-bound on `updated_at`
      schema:
        type: string
        format: date-time
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        UUIDv7 recommended. Replays of completed keys with matching request
        body return the original response. Conflicting body returns 409
        IDEMPOTENCY_CONFLICT. In-flight (request in progress on server) returns
        409 IDEMPOTENCY_IN_PROGRESS. Swept (server crashed) returns 409
        IDEMPOTENCY_UNKNOWN. Required for production use; optional for
        ad-hoc CLI invocations where the server auto-generates one.

        **Dry-run interaction:** when `dry_run: true`, the server does NOT
        persist an idempotency row. The same key may be reused once for the
        real (non-dry-run) call — the dry-run is a "free" preview. If the
        same key is sent on two real calls, normal idempotency rules apply.
      schema:
        type: string
        format: uuid

    IncludeTrashed:
      name: include_trashed
      in: query
      description: |
        Include soft-deleted rows in the response (default false).
        Only applies to resources that use Laravel's `SoftDeletes` trait
        (products, product options, pricing tiers, extras, questions).
      schema:
        type: boolean
        default: false

  responses:
    Unauthenticated:
      description: Missing, invalid, or expired bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            unauthenticated:
              value:
                meta:
                  request_id: req_01HXY...
                  api_version: v1
                error:
                  code: UNAUTHENTICATED
                  message: Missing or invalid bearer token.
                  retriable: false
    Forbidden:
      description: Token valid but lacks the ability for this action, or attempts cross-tenant access
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Resource not found in this tenant
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ValidationError:
      description: Request body or query failed validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            validation:
              value:
                meta:
                  request_id: req_01HXY...
                  api_version: v1
                error:
                  code: VALIDATION_FAILED
                  message: The request body has invalid fields.
                  hint: See `error.details` for per-field issues.
                  retriable: false
                  details:
                    capacity: ["The capacity must be at least 0."]
                    from: ["The from field is required."]
    IdempotencyConflict:
      description: |
        Idempotency-Key already used. One of:
        - `IDEMPOTENCY_CONFLICT` — same key, different request body.
        - `IDEMPOTENCY_IN_PROGRESS` — request still executing.
        - `IDEMPOTENCY_UNKNOWN` — server crashed mid-flight, swept by the `cli:prune-stale` artisan command (runs every 5 min against the central `cli_idempotency_keys` table). Caller must check Stripe/mailer logs by `request_id`.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    RateLimited:
      description: Plan-based throttle exceeded
      headers:
        Retry-After:
          description: Seconds to wait before retrying
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InternalError:
      description: Unhandled server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    Envelope:
      type: object
      required: [meta, data]
      properties:
        meta:
          $ref: "#/components/schemas/Meta"
        data:
          description: Per-endpoint payload (overridden via allOf in concrete responses)
        pagination:
          $ref: "#/components/schemas/Pagination"

    Meta:
      type: object
      required: [api_version, request_id, tenant_slug, generated_at]
      properties:
        api_version:
          type: string
          example: v1
        request_id:
          type: string
          description: ULID `req_<26 chars>`
          example: req_01HXY12345ABCDEFGHJKMNPQRS
        tenant_slug:
          type: string
          example: acme-tours
        actor:
          type: object
          properties:
            user_id: { type: integer }
            source:
              type: string
              description: Derived from request User-Agent (server does not trust client claims)
              example: cli/0.3.1
            is_cs:
              type: boolean
              description: Whether the actor token has CS-level abilities
        currency:
          type: string
          description: ISO 4217 code of the tenant
          example: EUR
        generated_at:
          type: string
          format: date-time
        dry_run:
          type: boolean
        idempotency_key:
          type: string
          nullable: true

    Pagination:
      type: object
      required: [limit]
      properties:
        limit: { type: integer }
        cursor_next:
          type: string
          nullable: true
          description: Opaque cursor for next page; null at end
        cursor_prev:
          type: string
          nullable: true
          description: |
            Reserved for Phase 2 backward pagination. Always `null` in V1.
            Documented now so adding backward pagination later is non-breaking.

    ErrorEnvelope:
      type: object
      required: [meta, error]
      properties:
        meta:
          type: object
          required: [api_version, request_id, generated_at]
          properties:
            api_version: { type: string, example: v1 }
            request_id: { type: string, example: req_01HXY12345ABCDEFGHJKMNPQRS }
            tenant_slug:
              type: string
              nullable: true
              description: |
                Set on errors returned after tenant resolution (most 4xx/5xx).
                Null on errors returned BEFORE tenancy is initialized
                (e.g. unauthenticated requests, tenant-not-found responses).
            generated_at: { type: string, format: date-time }
        error:
          $ref: "#/components/schemas/Error"

    Error:
      type: object
      required: [code, message, retriable]
      properties:
        code:
          type: string
          description: |
            Machine-readable error code. Stable across versions. Examples:
            UNAUTHENTICATED, FORBIDDEN, NOT_FOUND, VALIDATION_FAILED,
            IDEMPOTENCY_CONFLICT, IDEMPOTENCY_IN_PROGRESS, IDEMPOTENCY_UNKNOWN,
            BOOKING_ALREADY_CANCELLED, GIFT_CERT_ALREADY_REDEEMED,
            REFUND_AMOUNT_EXCEEDS_CHARGE, RESOURCE_IN_USE,
            AVAILABILITY_HAS_CONFIRMED_BOOKING, RATE_LIMITED, INTERNAL_ERROR.
        message:
          type: string
        hint:
          type: string
          description: Human-readable next-step guidance
        retriable:
          type: boolean
        details:
          type: object
          description: Per-field validation errors or domain-specific context
          additionalProperties: true

    MutationResult:
      type: object
      description: Common shape for mutation responses (and dry-run previews)
      properties:
        would_apply:
          type: boolean
          description: True only when the request was a dry-run
        diff:
          type: object
          description: Before/after summary (always present on dry-run, optional on commit)
          properties:
            before: { type: object, additionalProperties: true }
            after: { type: object, additionalProperties: true }
        side_effects:
          type: array
          description: List of jobs/mails/Stripe calls that ran (or would run on dry-run)
          items:
            type: object
            properties:
              type: { type: string, enum: [job, mail, broadcast, stripe] }
              identifier: { type: string }
              payload_summary: { type: string }

    Money:
      type: integer
      description: Amount in minor units of the tenant currency (cents for EUR/USD; whole units for JPY/HUF/etc)
      example: 15000

    WhoamiData:
      type: object
      properties:
        actor:
          type: object
          properties:
            user_id: { type: integer }
            email: { type: string, description: "Read-only — not validated as RFC-5322. Some legacy/imported rows carry malformed emails." }
            name: { type: string }
            is_cs: { type: boolean }
        tenant:
          type: object
          properties:
            slug: { type: string }
            name: { type: string }
            currency: { type: string }
            timezone: { type: string }
        token:
          type: object
          properties:
            name: { type: string }
            abilities:
              type: array
              items: { type: string }
            expires_at:
              type: string
              format: date-time
              nullable: true

    Product:
      type: object
      description: |
        Mirrors `ProductResource::toArray()`. Translatable text fields
        (`title`, `description`, `instructions`, `requirements`, `inclusions`,
        `exclusions`) are returned in English via
        `toArrayWithTranslations('en')`. `description`, `instructions`, and
        `requirements` are rich-text (HTML accepted). `inclusions` and
        `exclusions` are plain text — the dashboard renders them as a bullet
        list, splitting on newlines. `status` is derived from `is_active`
        (`is_active` is also surfaced directly for clients that prefer the
        canonical boolean).
      properties:
        id: { type: string }
        product_code: { type: string, nullable: true, description: "Tenant-supplied SKU. Auto-generated when `CreateProductRequest` omits it." }
        title: { type: string, nullable: true }
        description: { type: string, nullable: true }
        instructions: { type: string, nullable: true, description: "Translatable rich-text shown to confirmed customers." }
        requirements: { type: string, nullable: true, description: "Translatable rich-text — what the customer needs to bring / know." }
        inclusions: { type: string, nullable: true, description: "Plain text — what's included. One bullet per newline. Translatable. NOT rich-text — HTML/Markdown will render literally on the customer site, and the server rejects payloads containing HTML tags with 422." }
        exclusions: { type: string, nullable: true, description: "Plain text — what's not included. One bullet per newline. Translatable. NOT rich-text — HTML/Markdown will render literally on the customer site, and the server rejects payloads containing HTML tags with 422." }
        status:
          type: string
          enum: [draft, published]
          description: "Derived from `is_active` (`true` → published, `false` → draft)."
        is_active: { type: boolean, description: "Canonical boolean from the `is_active` column." }
        is_private: { type: boolean, nullable: true, description: "`true` = private (a single party books the whole experience); `false` = shared (multiple parties share the slot)." }
        is_priced_per_person: { type: boolean, nullable: true, description: "`true` = price applies per traveler; `false` = price applies per group/booking." }
        is_tier_priced: { type: boolean, nullable: true, description: "Whether pricing tiers (qty-based pricing) apply." }
        use_alternate_tier_pricing: { type: boolean, nullable: true, description: "Alternate tier-pricing rendering / calculation." }
        show_last_tier: { type: boolean, nullable: true, description: "Whether the last tier is displayed in customer-facing pricing." }
        displayable: { type: boolean, nullable: true, description: "Whether the product is shown in widgets / catalog." }
        must_validate_cancellation_policy: { type: boolean, nullable: true, description: "Customer must explicitly accept the cancellation policy at checkout." }
        schedule_type:
          type: string
          nullable: true
          enum: [date, datetime]
          description: "`date` = customer picks a date only; `datetime` = customer picks a date and a starting time."
        from_price:
          allOf: [{ $ref: "#/components/schemas/Money" }]
          nullable: true
        from_price_label: { type: string, nullable: true, description: "Caption shown next to `from_price` (e.g., `From €50/person`)." }
        currency: { type: string, nullable: true }
        capacity: { type: integer, nullable: true }
        cancellation_policy: { type: string, nullable: true, description: "Inline policy text. Mutually exclusive with `cancellation_policy_link` in the UI." }
        cancellation_policy_link: { type: string, format: uri, nullable: true, description: "External URL with the policy. Mutually exclusive with `cancellation_policy` in the UI." }
        locale: { type: string, nullable: true, description: "Default content locale for this product." }
        timezone: { type: string, nullable: true }
        category_ids:
          type: array
          items: { type: string }
          description: "IDs of attached `ProductCategory` rows; empty array when the relation isn't eager-loaded."
        deleted_at: { type: string, format: date-time, nullable: true, description: "Set when soft-deleted; null otherwise" }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }

    ProductOption:
      type: object
      description: |
        Mirrors `ProductOptionResource::toArray()`. The underlying
        `product_options` table column is `name`, but the wire shape exposes it
        as `title` for symmetry with Product (the controller maps
        `title` ↔ `name` on write). ProductOption has no `description` of its
        own — that lives on the parent Product. ProductOption likewise has no
        active/published flag; visibility is governed by the parent Product's
        `is_active`.
      properties:
        id: { type: string }
        product_id: { type: string }
        title: { type: string, nullable: true, description: "Sourced from the `name` column (no translatable layer)." }
        option_code: { type: string, nullable: true, description: "Tenant-supplied SKU. Auto-generated from the title slug + random suffix when omitted on create." }
        capacity: { type: integer, nullable: true }
        min_age: { type: integer, nullable: true }
        max_age: { type: integer, nullable: true }
        deleted_at: { type: string, format: date-time, nullable: true, description: "Set when soft-deleted; null otherwise" }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }

    AvailabilityRulePreview:
      type: object
      description: |
        Echo of the recurrence rule the server expanded plus a small sample
        of the resulting (from, to) windows for human inspection.
      properties:
        product_option_id: { type: string }
        start_date: { type: string, format: date }
        end_date: { type: string, format: date }
        weekdays:
          type: array
          items: { type: integer, minimum: 0, maximum: 6 }
          description: "PHP `format('w')` — Sunday=0 through Saturday=6."
        start_time: { type: string, example: "14:00" }
        end_time: { type: string, example: "18:00" }
        add_days_count: { type: integer, minimum: 0 }
        total_matched: { type: integer }
        sample_dates:
          type: array
          maxItems: 3
          items:
            type: object
            properties:
              from: { type: string, format: date-time }
              to: { type: string, format: date-time }

    Availability:
      type: object
      properties:
        id: { type: string }
        product_option_id: { type: string }
        date: { type: string, format: date }
        start_time: { type: string, nullable: true, example: "09:30" }
        capacity: { type: integer }
        capacity_remaining: { type: integer }
        status:
          type: string
          enum: [available, sold_out, blocked, cancelled]
        pricing_tier_ids:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    PricingCategory:
      type: object
      description: |
        Parent bucket that one or more `PricingTier` rows live under. Carries
        the named label (`Adults`, `Children`, ...) — translatable, returned
        in English. Soft-deleted rows cascade-delete their pricing tiers.
      properties:
        id: { type: string }
        product_id: { type: string, nullable: true }
        name: { type: string, nullable: true, description: "Translatable; English value returned." }
        type:
          type: string
          nullable: true
          enum: [ADULT, CHILD, INFANT, YOUTH, STUDENT, SENIOR, TRAVELLER, EU_CITIZEN, MILITARY, EU_CITIZEN_STUDENT]
        min_age: { type: integer, nullable: true }
        max_age: { type: integer, nullable: true }
        is_internal: { type: boolean, nullable: true, description: "Internal categories are excluded from public-facing checkout flows." }
        deleted_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }

    PricingTier:
      type: object
      description: |
        Mirrors `PricingTierResource::toArray()`. The `pricing_tiers` table
        has no `product_option_id`, `availability_id`, or `name` column — those
        belong to the parent `PricingCategory` (carries `name` + `product_id`)
        and to the M:N `availability_pricing_tier` pivot. Tiers describe a
        headcount band (`min`/`max`) and a `fare` (surfaced as `amount`).
        Currency is tenant-level and not stored per row; defaults to `EUR`.
      properties:
        id: { type: string }
        pricing_category_id: { type: string, nullable: true, description: "Parent `PricingCategory` row (carries the named bucket like `Adults`/`Children`)." }
        min: { type: integer, nullable: true, description: "Inclusive lower bound of the headcount band the tier applies to." }
        max: { type: integer, nullable: true, description: "Inclusive upper bound; null = open-ended." }
        amount:
          allOf: [{ $ref: "#/components/schemas/Money" }]
          nullable: true
          description: "Maps to the `fare` column."
        currency: { type: string, description: "Tenant currency; defaults to `EUR`." }
        deleted_at: { type: string, format: date-time, nullable: true, description: "Set when soft-deleted; null otherwise" }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }

    Discount:
      type: object
      description: |
        `Bmbltd\LaravelBookings\Models\Discount`. Soft-deletable (no
        explicit status enum — soft-delete IS the cancellation). The
        `discounted_price` column is set for fixed-amount discounts;
        `discount_pct` is set for percentage discounts (the two are
        mutually exclusive). Scope is determined by `product_option_id`:
        null = global, set = scoped to that single product option.
      properties:
        id: { type: string, description: "integer ID" }
        code: { type: string, description: "Promo code (uppercase by convention)" }
        product_option_id:
          type: string
          nullable: true
          description: When null, discount applies globally; when set, scoped to one product option
        discounted_price:
          $ref: "#/components/schemas/Money"
          nullable: true
          description: Fixed-amount discount in tenant currency minor units. Mutually exclusive with `discount_pct`.
        discount_pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          nullable: true
          description: Percentage discount (0-100). Mutually exclusive with `discounted_price`.
        nb_offers:
          type: integer
          nullable: true
          description: |
            Maximum redemptions, per CB convention (`Discount::scopeValid`):
            - `> 0` — positive limit, enforced via row-locked count check on apply
            - `-1` — explicit "unlimited"
            - `0` — exhausted (apply returns 409 DISCOUNT_NOT_APPLICABLE)
            - `null` — legacy unlimited (rows pre-feature)
        start_date: { type: string, format: date-time, nullable: true, description: "Promotional period start (advertising window)" }
        end_date: { type: string, format: date-time, nullable: true, description: "Promotional period end" }
        validity_start: { type: string, format: date-time, description: "Booking validity window start (when bookings using this discount must occur)" }
        validity_end: { type: string, format: date-time, nullable: true, description: "Booking validity window end" }
        auto_apply: { type: boolean, description: "If true, eligible bookings get this discount automatically without entering the code" }
        discount_text: { type: string, nullable: true, description: "Translatable customer-facing text (English value returned)" }
        discount_image: { type: string, nullable: true, description: "Asset path/URL" }
        groupon_import_id: { type: string, nullable: true }
        deleted_at: { type: string, format: date-time, nullable: true, description: "Set when soft-deleted; null otherwise. Soft-deletion IS cancellation for discounts." }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AvailableGiftCertificate:
      type: object
      description: |
        Sellable gift-cert SKU (the offering). Mirrors
        `AvailableGiftCertificateResource::toArray()`. `currency` has no
        underlying column on `available_gift_certificates` — it always
        serializes as null today (tenant-level currency is implied) but is
        kept on the wire for forward compatibility. `expiration_period_months`
        sources the `expiration_period` column, which the model accessor
        `expiryDurationInMonths` treats as MONTHS via
        `CarbonInterval::make($value, 'months')`. A value of -1 means
        "never expires". `cover_image_url` is sourced from the Paperclip
        `cover` attachment (read-only — uploads not yet supported via CLI).
      properties:
        id: { type: string }
        name: { type: string, nullable: true }
        amounts:
          type: array
          description: Available denominations (minor units)
          items: { $ref: "#/components/schemas/Money" }
        currency: { type: string, nullable: true, description: "Always null today — no column on the table; tenant-level currency is implied." }
        expiration_period_months: { type: integer, nullable: true, description: "Sources the `expiration_period` column (months). -1 means never expires." }
        cover_image_url: { type: string, format: uri, nullable: true, description: "URL of the Paperclip `cover` attachment when uploaded; null otherwise. Read-only via the CLI." }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }

    GiftCertificate:
      type: object
      description: |
        Issued gift-cert instance (a real cert in a customer's hands). Mirrors
        `GiftCertificateResource::toArray()`. `recipient_email` is the
        underlying `recipient` column; `recipient_name` is the `to` column.
        `currency` is sourced from `tenant()->currency` (no per-row column),
        falling back to `EUR`. `available_gift_certificate_id` references
        the `available_gift_certificate_uuid` column.
      properties:
        id: { type: string }
        available_gift_certificate_id: { type: string, nullable: true }
        code: { type: string, nullable: true }
        recipient_email: { type: string, nullable: true, description: "Read-only — not validated as RFC-5322. Some legacy/imported rows carry malformed emails." }
        recipient_name: { type: string, nullable: true }
        amount:
          allOf: [{ $ref: "#/components/schemas/Money" }]
          nullable: true
        remaining_amount:
          allOf: [{ $ref: "#/components/schemas/Money" }]
          nullable: true
        currency: { type: string }
        valid_from: { type: string, format: date-time, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        status:
          type: string
          enum: [active, redeemed, partial, void, expired]
        issued_at: { type: string, format: date-time, nullable: true }
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Set when the cert is voided (status maps to `void`).
        void_reason:
          type: string
          nullable: true
          description: |
            Operator-supplied reason captured on `POST /gift-certs/issued/{id}/void`.
            Null on certs that have not been voided.

    Customer:
      type: object
      description: |
        First-class `Bmbltd\LaravelBookings\Models\Customer` (vendor-package
        model used by the bookings engine). Soft-deletable, business-unit-scoped,
        carries Spatie schemaless `extra_attributes`. Aggregates (bookings_count,
        total_spent) are not surfaced in V1 — query `/bookings` and `/transactions`
        directly for those.
      properties:
        id: { type: string, description: "UUID" }
        name: { type: string }
        email: { type: string, nullable: true, description: "Read-only — not validated as RFC-5322. Some legacy/imported rows carry malformed emails." }
        phone: { type: string, nullable: true }
        zip_code: { type: string, nullable: true }
        country: { type: string, nullable: true, description: "ISO 3166-1 alpha-2" }
        notes: { type: string, nullable: true, description: "Free-form internal notes" }
        locales:
          type: array
          items: { type: string, description: "ISO 639-1 code (e.g. 'en', 'el')" }
          description: |
            Customer's preferred locales in priority order.
            `Customer::preferredLocale()` returns `locales->first()` (defaulting
            to 'en' if empty).
        secondary_email: { type: string, nullable: true, description: "Secondary contact email; receives notifications alongside `email`. Read-only — not validated as RFC-5322." }
        stripe_id: { type: string, nullable: true, description: "Stripe customer ID; nullable if never charged" }
        extra_attributes:
          type: object
          additionalProperties: true
          description: Schemaless attributes (Spatie `SchemalessAttributes` cast)
        deleted_at: { type: string, format: date-time, nullable: true, description: "Set when soft-deleted; null otherwise" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Booking:
      type: object
      properties:
        id: { type: string }
        reference:
          type: string
          nullable: true
          description: |
            Sourced from `bookings.reseller_reference` — there's no plain
            `reference` column on bookings. Populated for reseller-imported
            bookings, null for direct ones. Filter `?reference=` matches it.
        booking_status:
          type: string
          enum: [ON_HOLD, CONFIRMED, EXPIRED, CANCELLED]
          description: |
            Computed accessor (`getBookingStatusAttribute()` on the Booking model).
            Mapping:
            - `expires_at` in future → `ON_HOLD`
            - `expires_at` in past → `EXPIRED`
            - `cancelled_at` in past OR `deleted_at` set → `CANCELLED`
            - All-nulls / `confirmed_at` set → `CONFIRMED` (default branch)
            Filter `?booking_status=` translates to a 4-way SQL condition on the
            underlying timestamps.
        product_option_id: { type: string }
        availability_id: { type: string }
        customer:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
            email: { type: string, nullable: true, description: "Read-only — not validated as RFC-5322. Sourced from the linked Customer; legacy/imported rows (channel imports, manual walk-ins) commonly have no email and serialize as null. Generated clients must not assume RFC-5322 conformance." }
            phone: { type: string, nullable: true }
        guests:
          type: array
          items: { $ref: "#/components/schemas/Guest" }
        transactions:
          type: array
          items: { $ref: "#/components/schemas/Transaction" }
        total_amount:
          $ref: "#/components/schemas/Money"
          description: Sourced from `bookings.gross_price` (booking-level total).
        paid_amount:
          $ref: "#/components/schemas/Money"
          description: |
            Sum of charge `BookingTransaction.amount` (rows with
            `refund_for IS NULL`). Computed at serialization time from
            eager-loaded transactions.
        refunded_amount:
          $ref: "#/components/schemas/Money"
          description: |
            Absolute sum of refund `BookingTransaction.amount` (rows with
            `refund_for IS NOT NULL`). Refunds are stored negative; the
            response value is positive.
        discount_total:
          $ref: "#/components/schemas/Money"
          description: |
            Computed from the booking's `BookingDiscount` pivot rows.
            Sum of all applied discounts. Updated whenever a discount is
            applied or detached.
        applied_discount_ids:
          type: array
          items: { type: string }
          description: |
            IDs of discounts attached to this booking via `BookingDiscount`
            pivot rows (with `applied_at` timestamps). Updated by
            `POST /discounts/{id}/apply`.
        currency: { type: string }
        starts_at: { type: string, format: date-time }
        ends_at: { type: string, format: date-time, nullable: true }
        held_until: { type: string, format: date-time, nullable: true }
        confirmed_at:
          type: string
          format: date-time
          nullable: true
          description: Set when the booking transitions to confirmed; null on held/expired/cancelled rows.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Set on held bookings; null on confirmed bookings. Past `expires_at` + null `confirmed_at` = expired.
        cancelled_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time, nullable: true }

    Transaction:
      type: object
      properties:
        id: { type: string }
        booking_id: { type: string }
        type:
          type: string
          enum: [charge, refund]
          description: |
            Derived from CB's `BookingTransaction.refund_for` column: rows
            with `refund_for IS NULL` are charges; rows with `refund_for`
            pointing at the parent charge id are refunds. Refund rows have
            negative `amount` (e.g. `-5000` for a 5,000 minor-units refund).
        status:
          type: string
          enum: [succeeded]
          description: |
            Always `succeeded` — CB's `booking_transactions` table has no
            status column, so a row's existence implies the payment / refund
            landed. Failed payments don't produce a row at all.
        amount: { $ref: "#/components/schemas/Money" }
        currency: { type: string }
        stripe_charge_id:
          type: string
          nullable: true
          description: Stripe payment_intent id (charges only — null on refund rows).
        stripe_refund_id:
          type: string
          nullable: true
          description: Stripe refund id (refunds only — null on charge rows).
        refund_for:
          type: string
          nullable: true
          description: |
            For refund rows, the id of the parent charge transaction this
            refund settles. Null on charges.
        method:
          type: string
          nullable: true
          enum: [card, cash, paypal, gift, voucher, transfer]
        created_at: { type: string, format: date-time }

    Guest:
      type: object
      properties:
        id: { type: string }
        booking_id: { type: string }
        name: { type: string }
        email: { type: string, nullable: true, description: "Read-only — not validated as RFC-5322. Sourced from the linked Customer; legacy/imported rows can carry malformed emails." }
        phone: { type: string, nullable: true }
        passport: { type: string, nullable: true }
        dob: { type: string, format: date, nullable: true }
        dietary: { type: string, nullable: true }
        custom_attributes:
          type: object
          additionalProperties: true

    Extra:
      type: object
      description: |
        Mirrors `ExtraResource::toArray()`. The underlying `extras` table uses
        `title` (translatable) and `fare`; the wire shape exposes them as
        `name` and `amount`. The `extras` table has no `currency` column —
        `currency` comes from the tenant default, falling back to `EUR`.
        `max_quantity` is derived from the `maximum` discriminator and
        `maximum_bookable` columns: `maximum=custom` → real cap;
        `maximum=no_max` / `max_by_participant` → null in the wire response.
        Extras link to `Product` via the morphTo `product` columns
        (`product_id` + `product_type`).
      properties:
        id: { type: string }
        product_id: { type: string, nullable: true, description: "Sourced from the morph `product_id` column when `product_type=Product`." }
        name: { type: string, nullable: true, description: "English translation of the `title` column." }
        description: { type: string, nullable: true }
        amount:
          allOf: [{ $ref: "#/components/schemas/Money" }]
          nullable: true
          description: "Maps to the `fare` column."
        currency: { type: string, description: "Tenant currency; defaults to `EUR`." }
        max_quantity: { type: integer, nullable: true }
        deleted_at: { type: string, format: date-time, nullable: true, description: "Set when soft-deleted; null otherwise" }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }

    Question:
      type: object
      description: |
        Mirrors `QuestionResource::toArray()`. Underlying columns:
        `question` → `label`, `answer_type` → `type`, `is_required` →
        `required`. Questions are polymorphic (morphTo `questionable`); the
        wire shape exposes only the `ProductOption` case via
        `product_option_id` (sourced from `questionable_id`).
        The `questions` table has `public $timestamps = false`, so
        `created_at` / `updated_at` are always null. `type` returns the raw
        `answer_type` enum value (broader than the input enum).
      properties:
        id: { type: string }
        product_option_id: { type: string, nullable: true, description: "Sourced from `questionable_id` when `questionable_type=ProductOption`; null otherwise." }
        label: { type: string, nullable: true, description: "Sourced from the `question` column." }
        type:
          type: string
          nullable: true
          enum: [short_text, long_text, number, decimal_number, boolean, date, datetime, time, list, country, location_list, name, email, phone, birthdate]
          description: "Raw `answer_type` enum value. The write API accepts a narrower input enum (text/textarea/select/date/number/boolean) which the controller maps onto these values."
        required: { type: boolean }
        options:
          type: array
          items: { type: string }
          description: For type=select / list
        deleted_at: { type: string, format: date-time, nullable: true, description: "Set when soft-deleted; null otherwise" }
        created_at: { type: string, format: date-time, nullable: true, description: "Always null — `Question` model has `$timestamps = false`." }
        updated_at: { type: string, format: date-time, nullable: true, description: "Always null — `Question` model has `$timestamps = false`." }

    UpdateAvailabilityRequest:
      type: object
      properties:
        capacity: { type: integer, minimum: 0 }
        status:
          type: string
          enum: [available, blocked, cancelled]
        dry_run: { type: boolean, default: false }

    BulkDeleteAvailabilityRequest:
      type: object
      required: [product_option_id, from, to]
      description: |
        Filter shape mirrors `BulkUpdateAvailabilityRequest` so a CLI flow
        that previewed a date-range change can reuse the same payload to
        delete instead. Range is half-open: rows where `from >= from AND
        from < to` are matched.
      properties:
        product_option_id: { type: string }
        from: { type: string, format: date }
        to: { type: string, format: date }
        dry_run: { type: boolean, default: false }

    CreateAvailabilityRuleRequest:
      type: object
      required: [product_option_id, start_date, end_date, weekdays]
      description: |
        Mirrors `CreateAvailabilityRuleRequest::rules()`. `start_time` and
        `end_time` are required for `datetime` products; ignored for
        `date`-only products. Weekday values use PHP's `format('w')`
        convention — Sunday=0, Saturday=6.
      properties:
        product_option_id: { type: string }
        start_date: { type: string, format: date, example: "2026-05-01" }
        end_date: { type: string, format: date, example: "2026-08-31" }
        weekdays:
          type: array
          minItems: 1
          items: { type: integer, minimum: 0, maximum: 6 }
          example: [3, 6]
        start_time: { type: string, nullable: true, example: "14:00" }
        end_time: { type: string, nullable: true, example: "18:00" }
        add_days_count:
          type: integer
          minimum: 0
          default: 0
          description: "Multi-day events: number of days to add to the `to` timestamp."
        dry_run: { type: boolean, default: false }

    BulkUpdateAvailabilityRequest:
      type: object
      required: [product_option_id, from, to, setting, new_value]
      description: |
        Single setting per request — the underlying `BulkAvailabilityUpdateJob`
        only handles one setting at a time. To change multiple settings (e.g.
        capacity AND bookable status), make multiple calls. Server fan-outs
        chunks of ~1000 IDs into `inventory` queue jobs; response returns 202
        with `bulk_update_id`.
      properties:
        product_option_id: { type: string }
        from: { type: string, format: date }
        to: { type: string, format: date }
        setting:
          type: string
          enum: [booking_status, capacity, pricing, start_time, end_time]
          description: |
            Discriminator for `new_value` shape. Maps to `BulkAvailabilityUpdateJob::$setting`.
        new_value:
          oneOf:
            - title: BookingStatusValue
              type: object
              required: [is_bookable]
              properties:
                is_bookable: { type: boolean }
              description: "When `setting=booking_status`."
            - title: CapacityValue
              type: object
              required: [value, operator]
              properties:
                value: { type: integer, minimum: 0 }
                operator:
                  type: string
                  enum: [set_to, increase_by, decrease_by]
                  description: From `App\Enums\Inventory\CapacityOperator`. `set_to` replaces; `increase_by`/`decrease_by` are deltas.
              description: "When `setting=capacity`."
            - title: PricingValue
              type: object
              required: [fares]
              properties:
                fares:
                  type: array
                  items:
                    type: object
                    required: [pricing_tier_id, amount]
                    properties:
                      pricing_tier_id: { type: string }
                      amount: { $ref: "#/components/schemas/Money" }
              description: "When `setting=pricing`. Replaces existing fares for the listed tiers; tiers omitted are left alone (the underlying service uses `replaceAll: false`)."
            - title: TimeValue
              type: object
              required: [start_time, end_time]
              properties:
                start_time: { type: string, example: "09:30" }
                end_time: { type: string, example: "11:30" }
                day_count: { type: integer, default: 0, description: "Days the activity spans (for multi-day tours)" }
              description: "When `setting=start_time` or `setting=end_time`."
        dry_run: { type: boolean, default: false }

    CreateDiscountRequest:
      type: object
      required: [code, validity_start]
      description: |
        Provide exactly one of `discounted_price` (fixed-amount) or
        `discount_pct` (percentage). Server returns 422 if both or neither
        are provided. `product_option_id` null = global discount; otherwise
        scoped to one option.
      properties:
        code: { type: string, maxLength: 100 }
        product_option_id: { type: string, nullable: true }
        discounted_price:
          $ref: "#/components/schemas/Money"
          nullable: true
        discount_pct:
          type: number
          minimum: 0
          maximum: 100
          nullable: true
        nb_offers: { type: integer, nullable: true }
        start_date: { type: string, format: date-time, nullable: true }
        end_date: { type: string, format: date-time, nullable: true }
        validity_start: { type: string, format: date-time }
        validity_end: { type: string, format: date-time, nullable: true }
        auto_apply: { type: boolean, default: false }
        discount_text: { type: string, nullable: true }
        discount_image: { type: string, nullable: true }
        dry_run: { type: boolean, default: false }

    IssueGiftCertRequest:
      type: object
      required: [available_gift_certificate_id, recipient_email, recipient_name, amount]
      properties:
        available_gift_certificate_id: { type: string }
        recipient_email: { type: string, format: email }
        recipient_name: { type: string }
        amount: { $ref: "#/components/schemas/Money" }
        expires_at: { type: string, format: date-time, nullable: true }
        send_now:
          type: boolean
          default: false
          description: |
            If true, server emails the redemption code to `recipient_email`
            immediately. Default false to avoid accidental emails when the
            CLI / LLM intends to issue + manually verify before sending. To
            send a previously-issued cert, use `POST /gift-certs/issued/{id}/resend`.
        sender_message: { type: string, maxLength: 1000, nullable: true }
        dry_run: { type: boolean, default: false }

    CancelBookingRequest:
      type: object
      required: [reason, refund_policy]
      properties:
        reason: { type: string, maxLength: 500 }
        notify_customer: { type: boolean, default: true }
        refund_policy:
          type: string
          enum: [none, full, partial]
          description: |
            `none`, `full`, `partial` override the product's cancellation
            policy (CS only — operator tokens are 403 on overrides). All
            three are CS-attributed in the audit log.

            `auto` is **not yet supported** in V1: `Product.cancellation_policy`
            is a free-text human description, and there is no machine policy
            engine to derive a refund amount from it. Callers that pass
            `auto` receive `422 POLICY_AUTO_NOT_READY`. `auto` will be
            re-added to this enum once the structured policy engine ships.
        refund_amount:
          $ref: "#/components/schemas/Money"
          description: Required when refund_policy=partial
        dry_run: { type: boolean, default: false }

    RefundBookingRequest:
      type: object
      required: [amount, reason]
      properties:
        amount: { $ref: "#/components/schemas/Money" }
        transaction_id:
          type: string
          nullable: true
          description: Specific charge to refund (otherwise newest succeeded charge)
        reason: { type: string, maxLength: 500 }
        notify_customer:
          type: boolean
          default: false
          description: |
            Defaults OFF — this is a CS engineering tool, and operators
            debugging refund flows shouldn't silently email customers. Set
            `true` explicitly to dispatch the refund-receipt notification.
        dry_run: { type: boolean, default: false }

    UpdateGuestRequest:
      type: object
      properties:
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        passport: { type: string }
        dob: { type: string, format: date }
        dietary: { type: string }
        custom_attributes:
          type: object
          additionalProperties: true
        dry_run: { type: boolean, default: false }

